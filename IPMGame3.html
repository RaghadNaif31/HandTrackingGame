<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPM Game Web</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:radial-gradient(circle at center,#1b0f55 0%,#070014 70%);
color:white;
text-align:center;
direction:ltr;
overflow:hidden;
}

#menu{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:
linear-gradient(rgba(7,0,20,.75),rgba(7,0,20,.9)),
radial-gradient(circle at 20% 30%,rgba(0,255,229,.22),transparent 25%),
radial-gradient(circle at 80% 70%,rgba(180,92,255,.25),transparent 25%);
}

.menu-card{
width:780px;
max-width:90%;
padding:35px;
border:3px solid #5b35ff;
border-radius:22px;
box-shadow:0 0 25px #5b35ff, inset 0 0 35px rgba(0,255,229,.12);
background:rgba(10,4,40,.72);
}

.logo-img{
width:240px;
filter:drop-shadow(0 0 18px #00ffe5);
margin-bottom:12px;
}

.logo{
font-size:62px;
font-weight:bold;
color:#b45cff;
text-shadow:0 0 15px #b45cff,0 0 30px #5b35ff;
letter-spacing:2px;
}

.sub{
color:#00ffe5;
font-size:26px;
font-weight:bold;
text-shadow:0 0 12px #00ffe5;
margin-bottom:22px;
}

input{
padding:13px;
width:230px;
border-radius:14px;
border:2px solid #00ffe5;
background:#09031f;
color:white;
text-align:center;
margin-bottom:14px;
outline:none;
box-shadow:0 0 14px rgba(0,255,229,.6);
}

button{
padding:13px 35px;
background:linear-gradient(90deg,#00ffe5,#7b2cff);
color:white;
border:2px solid white;
border-radius:16px;
font-weight:bold;
font-size:17px;
cursor:pointer;
box-shadow:0 0 18px #00ffe5;
transition:.2s;
}
button:hover{
transform:scale(1.06);
box-shadow:0 0 25px #b45cff;
}

#game{
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

canvas{
background:#09031f;
border:3px solid #5b35ff;
border-radius:14px;
box-shadow:0 0 25px #5b35ff, inset 0 0 25px rgba(0,255,229,.15);
}

#gameover{
display:none;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
direction:ltr;
background:
radial-gradient(circle at center,rgba(0,255,229,.12),transparent 35%),
linear-gradient(180deg,#120a3a,#09031f);
}

#gameover h1{
color:#b45cff;
text-shadow:0 0 20px #b45cff;
}

#gameover h3{
color:#00ffe5;
text-shadow:0 0 15px #00ffe5;
}
</style>
</head>

<body>

<div id="menu">
<div class="menu-card">
<img src="image.png" class="logo-img" alt="Logo">
<div class="logo">MANUFACTURING</div>
<div class="sub">IPM GAME</div>
<input id="nameInput" placeholder="Enter your name">
<br>
<button onclick="startGame()">▶ START GAME</button>
</div>
</div>

<div id="game">
<canvas id="c" width="1000" height="400"></canvas>
</div>

<div id="gameover">
<h1>GAME OVER</h1>
<h2 id="scoreText"></h2>

<div>
<button onclick="restart()">Play Again</button>
<button onclick="newPlayer()">New Player</button>
</div>

<h3>🏆 TOP 3</h3>
<div id="leaderboard"></div>
</div>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let player, obstacles, score, speed, name;
let gameRunning = false;
let holdJump = false;

let groundY = 330;
let gravity = 0.8;
let jumpPower = -17;

let bodyH = 35;
let legH = 10;
let columnCooldown = 0;

let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

function startGame(){
name = document.getElementById("nameInput").value || "Player";

document.getElementById("menu").style.display = "none";
document.getElementById("game").style.display = "flex";

resetGame();
gameRunning = true;
loop();
}

function resetGame(){
player = {
x:60,
y:groundY - bodyH - legH,
w:35,
h:bodyH + legH,
vy:0,
grounded:true
};

obstacles = [];
score = 0;
speed = 3.3;
columnCooldown = 0;
holdJump = false;

spawnObstacle();
}

window.addEventListener("keydown", function(e){
if(e.code === "Space" || e.key === " "){
e.preventDefault();
holdJump = true;
jump();
}
});

window.addEventListener("keyup", function(e){
if(e.code === "Space" || e.key === " "){
e.preventDefault();
holdJump = false;
}
});

function jump(){
if(player.grounded){
player.vy = jumpPower;
player.grounded = false;
}
}

function loop(){
if(!gameRunning) return;
update();
draw();
requestAnimationFrame(loop);
}

function update(){
player.vy += gravity;
player.y += player.vy;
player.grounded = false;

if(player.y + player.h >= groundY){
player.y = groundY - player.h;
player.vy = 0;
player.grounded = true;
}

if(holdJump && player.grounded){
jump();
}

for(let o of obstacles){
o.x -= speed;
}

for(let o of obstacles){
if(!o.passed && o.x + o.w < player.x){
score++;
o.passed = true;
}
}

obstacles = obstacles.filter(o => o.x + o.w > -100);

if(obstacles.length === 0 || getLastObstacleX() < 620){
spawnObstacle();
}

speed += 0.0004;

checkCollision();
}

function getLastObstacleX(){
let lastX = 0;
for(let o of obstacles){
if(o.x > lastX) lastX = o.x;
}
return lastX;
}

function spawnObstacle(){
let startX = 1000;

if(columnCooldown > 0) columnCooldown--;

let canSpawnColumns = columnCooldown === 0;
let type = Math.floor(Math.random() * 3);

if(type === 2 && canSpawnColumns){
addColumns(startX);
columnCooldown = 2;
}else{
addNormalObstacle(startX);
}
}

function addColumns(startX){
let heights = [60,90,120];
let xPositions = [startX,startX+180,startX+380];

for(let i=0;i<heights.length;i++){
obstacles.push({
type:"column",
x:xPositions[i],
y:groundY-heights[i],
w:55,
h:heights[i],
passed:false
});
}
}

function addNormalObstacle(startX){
let type = Math.floor(Math.random()*2);

if(type === 0){
obstacles.push({
type:"block",
x:startX,
y:groundY-50,
w:50,
h:50,
passed:false
});
}else{
obstacles.push({
type:"spike",
x:startX,
y:groundY-45,
w:50,
h:45,
passed:false
});
}
}

function checkCollision(){
for(let o of obstacles){
let hit =
player.x < o.x + o.w &&
player.x + player.w > o.x &&
player.y < o.y + o.h &&
player.y + player.h > o.y;

if(hit){
if(o.type === "column"){
let playerBottom = player.y + player.h;
let previousBottom = playerBottom - player.vy;
let landingFromTop = previousBottom <= o.y + 6 && player.vy >= 0;

if(landingFromTop){
player.y = o.y - player.h;
player.vy = 0;
player.grounded = true;
}else{
gameOver();
}
}else{
gameOver();
}
}
}
}

function draw(){
ctx.clearRect(0,0,1000,400);
drawNeonBackground();
drawGround();
drawPlayer();

for(let o of obstacles){
if(o.type === "spike") drawSpike(o);
else if(o.type === "block") drawBlock(o);
else drawColumn(o);
}

ctx.fillStyle="white";
ctx.font="bold 18px Arial";
ctx.shadowBlur=10;
ctx.shadowColor="#00ffe5";
ctx.fillText("LEVEL 1",20,28);
ctx.fillText("Score: "+score,20,55);
ctx.shadowBlur=0;
}

function drawNeonBackground(){
let g = ctx.createLinearGradient(0,0,0,400);
g.addColorStop(0,"#09031f");
g.addColorStop(.55,"#15105a");
g.addColorStop(1,"#09031f");
ctx.fillStyle=g;
ctx.fillRect(0,0,1000,400);

ctx.strokeStyle="rgba(0,255,229,.16)";
ctx.lineWidth=1;
for(let x=0;x<1000;x+=50){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,400);
ctx.stroke();
}

ctx.strokeStyle="rgba(180,92,255,.20)";
for(let y=0;y<400;y+=50){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(1000,y);
ctx.stroke();
}

drawGear(820,80,42);
drawGear(480,115,32);
drawGear(900,285,28);

ctx.fillStyle="rgba(180,92,255,.18)";
for(let i=0;i<7;i++){
ctx.fillRect(120+i*130,240-Math.sin(i)*40,45,90);
}
}

function drawGear(cx,cy,r){
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(Date.now()/2500);
ctx.strokeStyle="rgba(180,92,255,.55)";
ctx.lineWidth=5;
ctx.beginPath();
ctx.arc(0,0,r,0,Math.PI*2);
ctx.stroke();
ctx.beginPath();
ctx.arc(0,0,r/2.5,0,Math.PI*2);
ctx.stroke();

for(let i=0;i<10;i++){
ctx.rotate(Math.PI/5);
ctx.strokeRect(r-5,-5,16,10);
}
ctx.restore();
}

function drawGround(){
ctx.shadowBlur=16;
ctx.shadowColor="#b45cff";
ctx.fillStyle="#b45cff";
ctx.fillRect(0,groundY,1000,5);

ctx.shadowColor="#00ffe5";
ctx.strokeStyle="#00ffe5";
ctx.lineWidth=2;
ctx.beginPath();
for(let x=0;x<1000;x+=25){
ctx.lineTo(x, groundY + 18 + Math.sin(x/12)*3);
}
ctx.stroke();
ctx.shadowBlur=0;
}

function drawPlayer(){
let t = Date.now()/100;
let bodyY = player.y;
let legsY = player.y + bodyH;

ctx.save();

if(!player.grounded){
ctx.translate(player.x+player.w/2, bodyY+bodyH/2);
ctx.rotate(0.15);
ctx.translate(-(player.x+player.w/2), -(bodyY+bodyH/2));
}

ctx.shadowBlur=18;
ctx.shadowColor="#00ffe5";

ctx.fillStyle="#00d8c8";
ctx.fillRect(player.x,bodyY,player.w,bodyH);

ctx.strokeStyle="white";
ctx.lineWidth=2;
ctx.strokeRect(player.x,bodyY,player.w,bodyH);

ctx.fillStyle="black";
ctx.fillRect(player.x+8,bodyY+10,5,5);
ctx.fillRect(player.x+21,bodyY+10,5,5);

let legMove = Math.sin(t*5)*3;
ctx.fillStyle="#00ffe5";
ctx.fillRect(player.x+5,legsY,6,legH+legMove);
ctx.fillRect(player.x+player.w-11,legsY,6,legH-legMove);

ctx.restore();
ctx.shadowBlur=0;
ctx.lineWidth=1;
}

function drawBlock(o){
ctx.shadowBlur=16;
ctx.shadowColor="#b45cff";

let g = ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
g.addColorStop(0,"#4a0f91");
g.addColorStop(1,"#14072d");
ctx.fillStyle=g;
ctx.fillRect(o.x,o.y,o.w,o.h);

ctx.strokeStyle="#00ffe5";
ctx.lineWidth=3;
ctx.strokeRect(o.x,o.y,o.w,o.h);

ctx.strokeStyle="#b45cff";
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(o.x+8,o.y+8);
ctx.lineTo(o.x+o.w-8,o.y+o.h-8);
ctx.moveTo(o.x+o.w-8,o.y+8);
ctx.lineTo(o.x+8,o.y+o.h-8);
ctx.stroke();

ctx.shadowBlur=0;
ctx.lineWidth=1;
}

function drawSpike(o){
ctx.shadowBlur=16;
ctx.shadowColor="#00ffe5";

ctx.fillStyle="#24104d";
ctx.beginPath();
ctx.moveTo(o.x,groundY);
ctx.lineTo(o.x+o.w/2,groundY-o.h);
ctx.lineTo(o.x+o.w,groundY);
ctx.closePath();
ctx.fill();

ctx.strokeStyle="#00ffe5";
ctx.lineWidth=3;
ctx.stroke();

ctx.shadowBlur=0;
ctx.lineWidth=1;
}

function drawColumn(o){
ctx.shadowBlur=18;
ctx.shadowColor="#b45cff";

let g = ctx.createLinearGradient(o.x,o.y,o.x,groundY);
g.addColorStop(0,"#4a0f91");
g.addColorStop(1,"#09031f");

ctx.fillStyle=g;
ctx.fillRect(o.x,o.y,o.w,o.h);

ctx.strokeStyle="#00ffe5";
ctx.lineWidth=3;
ctx.strokeRect(o.x,o.y,o.w,o.h);

ctx.fillStyle="#b45cff";
ctx.fillRect(o.x-7,o.y,o.w+14,8);
ctx.fillRect(o.x-7,groundY-8,o.w+14,8);

ctx.strokeStyle="rgba(0,255,229,.65)";
ctx.lineWidth=1;
for(let y=o.y+20;y<groundY-12;y+=20){
ctx.beginPath();
ctx.moveTo(o.x+8,y);
ctx.lineTo(o.x+o.w-8,y);
ctx.stroke();
}

ctx.shadowBlur=0;
ctx.lineWidth=1;
}

function gameOver(){
gameRunning = false;
holdJump = false;

saveScore();

document.getElementById("game").style.display = "none";
document.getElementById("gameover").style.display = "flex";

document.getElementById("scoreText").innerText =
name + " Score: " + score;

showBoard();
}

function saveScore(){
let found = board.find(p=>p.name===name);

if(found){
if(score > found.score) found.score = score;
}else{
board.push({name:name, score:score});
}

localStorage.setItem("leaderboard", JSON.stringify(board));
}

function showBoard(){
board.sort((a,b)=>b.score-a.score);
let html = "";

for(let i=0;i<Math.min(3,board.length);i++){
html += `<p>${i+1}. ${board[i].name} - ${board[i].score}</p>`;
}

document.getElementById("leaderboard").innerHTML = html;
}

function restart(){
document.getElementById("gameover").style.display="none";
document.getElementById("game").style.display="flex";

resetGame();
gameRunning = true;
loop();
}

function newPlayer(){
location.reload();
}
</script>

</body>
</html>
